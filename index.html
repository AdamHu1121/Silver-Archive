<style>
:root{
  --counter:#15161a; --surface:#1e2026; --surface-2:#0f1013; --contact-bg:#0f1013; --mat:#0a0a0c;
  --paper:#e8e6e0; --paper-dim:#b9b8b2; --gray:#83847e; --gray-dim:#54565b;
  --line:rgba(232,230,224,.12); --line-soft:rgba(232,230,224,.07);
  --glow:rgba(232,230,224,.04); --glow-strong:rgba(232,230,224,.07);
  --grain-blend:screen; --grain-opacity:.03; --field:#101116;
  --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace; --serif:"Fraunces",Georgia,serif;
  --ease:cubic-bezier(.22,.61,.36,1);
}
[data-theme="day"]{
  --counter:#ecedea; --surface:#e3e3df; --surface-2:#f5f4ef; --contact-bg:#f5f4ef; --mat:#1d1d1f;
  --paper:#1b1b1e; --paper-dim:#48484b; --gray:#6c6c68; --gray-dim:#9a9a94;
  --line:rgba(20,20,22,.16); --line-soft:rgba(20,20,22,.08);
  --glow:rgba(20,20,22,.03); --glow-strong:rgba(20,20,22,.025);
  --grain-blend:multiply; --grain-opacity:.05; --field:#fbfaf6;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--counter);color:var(--paper);font-family:var(--mono);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;overflow-x:hidden;
  transition:background .6s var(--ease),color .6s var(--ease)}
body::before{content:"";position:fixed;inset:-10px;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
  opacity:var(--grain-opacity);mix-blend-mode:var(--grain-blend);animation:grain .5s steps(3) infinite}
.enlarger{position:fixed;left:-15%;right:-15%;top:-25%;height:130vh;z-index:0;pointer-events:none;
  background:radial-gradient(58% 46% at 50% 0%, var(--glow-strong), transparent 72%);
  filter:blur(24px);animation:drift 28s ease-in-out infinite alternate}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
img{display:block;width:100%;height:100%;object-fit:cover}
.wrap{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:clamp(28px,6vw,72px) clamp(20px,5vw,56px) 96px}

.switch{position:fixed;top:18px;right:18px;z-index:40;display:inline-flex;align-items:center;gap:9px;
  font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gray);
  border:1px solid var(--line);padding:8px 13px;background:color-mix(in srgb, var(--counter) 70%, transparent);
  backdrop-filter:blur(6px);transition:.3s var(--ease)}
.switch:hover{color:var(--paper);border-color:var(--paper-dim)}
.switch .disc{width:11px;height:11px;border-radius:50%;border:1px solid currentColor;
  background:linear-gradient(90deg,currentColor 50%,transparent 50%)}
.snd{right:132px}
.snd.on .disc{background:currentColor}

.mast{margin-bottom:clamp(40px,8vw,84px)}
.mast .name{font-family:var(--mono);font-weight:500;font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--gray);margin:0 0 18px}
.mast h1{font-family:var(--serif);font-optical-sizing:auto;font-weight:340;font-size:clamp(40px,9vw,82px);
  line-height:.92;letter-spacing:-.01em;margin:0;color:var(--paper);animation:develop-title 1s var(--ease) both}
.mast h1 .cn{display:block;font-size:clamp(15px,3vw,22px);letter-spacing:.5em;font-weight:400;color:var(--paper-dim);margin-top:16px;padding-left:.5em}
.mast .statement{font-family:var(--mono);font-size:12.5px;letter-spacing:.04em;color:var(--gray);margin:26px 0 0;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;animation:fade 1.2s var(--ease) .35s both}
.mast .statement::before{content:"";width:38px;height:1px;background:var(--line)}

.rolls{display:flex;flex-direction:column;gap:clamp(34px,5vw,52px)}
.roll-row{opacity:0;transform:translateY(14px);animation:rise .8s var(--ease) forwards}
.roll-head{display:flex;align-items:baseline;justify-content:space-between;gap:20px;padding-bottom:14px;border-bottom:1px solid var(--line);margin-bottom:18px;flex-wrap:wrap}
.roll-head .lhs{display:flex;align-items:baseline;gap:18px;min-width:0}
.roll-no{font-family:var(--mono);font-size:11px;letter-spacing:.28em;color:var(--gray-dim);text-transform:uppercase;white-space:nowrap}
.roll-title{font-family:var(--serif);font-weight:380;font-size:clamp(20px,3.4vw,28px);letter-spacing:-.01em;color:var(--paper);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.roll-meta{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--gray);text-align:right;white-space:nowrap}
.strip{display:grid;grid-auto-flow:column;grid-auto-columns:clamp(94px,13vw,128px);gap:6px;overflow-x:auto;padding:10px;
  background:var(--surface-2);border:1px solid var(--line-soft);scrollbar-width:thin;scrollbar-color:var(--gray-dim) transparent;transition:background .6s var(--ease)}
.strip::-webkit-scrollbar{height:7px}
.strip::-webkit-scrollbar-thumb{background:var(--gray-dim)}
.strip-cell{position:relative;aspect-ratio:3/2;background:var(--mat);outline:1px solid rgba(0,0,0,.6);overflow:hidden;transition:transform .35s var(--ease)}
.strip-cell .neg{width:100%;height:100%;filter:invert(1) grayscale(1) contrast(1.05);transition:filter .4s var(--ease),transform .5s var(--ease)}
.strip-cell:hover{transform:translateY(-3px);z-index:2}
.strip-cell:hover .neg,.strip-cell:focus-visible .neg{filter:none}
.strip-cell .fno{position:absolute;left:5px;bottom:4px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:#fff;mix-blend-mode:difference;opacity:.8}
.strip-cell:focus-visible{outline:2px solid var(--paper);outline-offset:1px}
.roll-open{margin-top:14px;font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gray);display:inline-flex;align-items:center;gap:9px}
.roll-open .arrow{transition:transform .35s var(--ease)}
.roll-row:hover .roll-open .arrow{transform:translateX(5px)}
.roll-open:hover{color:var(--paper)}

.view{display:none}
.view.active{display:block;animation:view-in .55s var(--ease)}
.crumb{display:flex;align-items:center;gap:14px;margin-bottom:30px;font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;flex-wrap:wrap}
.crumb .back{color:var(--gray);display:inline-flex;align-items:center;gap:8px}
.crumb .back:hover{color:var(--paper)}
.crumb .here{color:var(--paper-dim)}
.crumb .count{margin-left:auto;color:var(--gray-dim)}

.sheet-head{margin-bottom:30px}
.sheet-top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:18px}
.sheet-head h2{font-family:var(--serif);font-weight:360;font-size:clamp(30px,6vw,52px);line-height:1;letter-spacing:-.015em;margin:0;color:var(--paper)}
.scan-btn{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gray);border:1px solid var(--line);padding:10px 15px;display:inline-flex;align-items:center;gap:10px;transition:.3s var(--ease);white-space:nowrap}
.scan-btn:hover{color:var(--paper);border-color:var(--paper-dim);background:var(--glow)}
.scan-btn .lp{width:12px;height:12px;border:1.5px solid currentColor;border-radius:50%;position:relative}
.scan-btn .lp::after{content:"";position:absolute;right:-4px;bottom:-3px;width:5px;height:1.5px;background:currentColor;transform:rotate(45deg)}
.specsheet{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--line-soft);border:1px solid var(--line-soft)}
.spec{background:var(--counter);padding:13px 15px;transition:background .6s var(--ease)}
.spec .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gray-dim);margin-bottom:6px}
.spec .v{font-family:var(--mono);font-size:13px;letter-spacing:.02em;color:var(--paper)}
.contact{margin-top:38px;background:var(--contact-bg);padding:clamp(12px,2.4vw,22px);border:1px solid var(--line-soft);transition:background .6s var(--ease)}
.contact-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:clamp(7px,1.4vw,13px)}
.cell{position:relative;aspect-ratio:3/2;background:var(--mat);overflow:hidden;outline:1px solid rgba(0,0,0,.45);opacity:0;transform:scale(.97);animation:pop .55s var(--ease) forwards}
.cell img,.cell .ph{width:100%;height:100%;filter:grayscale(1) contrast(1.04);transition:transform .6s var(--ease),filter .4s var(--ease)}
.cell:hover img,.cell:hover .ph{transform:scale(1.06)}
.cell:focus-visible{outline:2px solid var(--paper);outline-offset:1px}
.cell .fno{position:absolute;left:6px;bottom:5px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:#fff;mix-blend-mode:difference}
.cell::after{content:"";position:absolute;inset:0;border:1px solid rgba(255,255,255,.05);pointer-events:none}

.frame-wrap{display:grid;grid-template-columns:1.5fr 1fr;gap:clamp(28px,5vw,60px);align-items:start}
.plate-inner{position:relative;background:var(--mat);padding:clamp(10px,1.8vw,18px);outline:1px solid var(--line-soft);transition:background .6s var(--ease)}
.plate figure{margin:0;position:relative;overflow:hidden;background:var(--surface-2)}
.plate figure img,.plate figure .ph{width:100%;height:auto;aspect-ratio:3/2;object-fit:cover;filter:grayscale(1) contrast(1.05)}
.plate figure img.dev{animation:develop .85s var(--ease)}
.plate.is-neg figure img,.plate.is-neg figure .ph{filter:invert(1) grayscale(1) contrast(1.05)}
.rebate{display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--paper-dim);padding:9px 4px 2px;opacity:.7;text-transform:uppercase}
.rebate .dots{letter-spacing:.05em;color:var(--gray-dim)}
.toggle{margin-top:18px;display:inline-flex;align-items:center;gap:10px;font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);border:1px solid var(--line);padding:9px 15px;transition:.3s var(--ease)}
.toggle:hover{color:var(--paper);border-color:var(--paper-dim);background:var(--glow)}
.toggle .dot{width:7px;height:7px;border:1px solid currentColor;border-radius:50%;transition:.3s}
.toggle.on .dot{background:currentColor}
.data .fhead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px}
.data .fno-big{font-family:var(--serif);font-weight:330;font-size:clamp(40px,8vw,68px);line-height:.85;color:var(--paper)}
.data .of{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--gray-dim)}
.datatable{border-top:1px solid var(--line)}
.datatable .row{display:flex;justify-content:space-between;gap:18px;padding:11px 0;border-bottom:1px solid var(--line-soft);opacity:0;animation:row-in .5s var(--ease) forwards}
.datatable .k{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gray-dim)}
.datatable .v{font-family:var(--mono);font-size:13px;letter-spacing:.02em;color:var(--paper);text-align:right}
.note{margin-top:26px;font-family:var(--serif);font-style:italic;font-weight:330;font-size:clamp(17px,2.6vw,21px);line-height:1.5;color:var(--paper-dim);animation:fade .8s var(--ease) .25s both}
.note::before{content:"“";color:var(--gray-dim)}
.note::after{content:"”";color:var(--gray-dim)}
.framenav{display:flex;gap:10px;margin-top:34px}
.framenav button{flex:1;font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gray);border:1px solid var(--line);padding:12px;transition:.3s var(--ease)}
.framenav button:hover:not(:disabled){color:var(--paper);border-color:var(--paper-dim)}
.framenav button:disabled{opacity:.3;cursor:default}

.scan-overlay{position:fixed;inset:0;z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:clamp(20px,5vw,60px);background:color-mix(in srgb, var(--counter) 86%, #000 14%);backdrop-filter:blur(10px)}
.scan-overlay.open{display:flex;animation:fade .4s var(--ease)}
.scan-stage{position:relative;max-width:min(1000px,92vw);max-height:78vh;line-height:0;box-shadow:0 30px 90px rgba(0,0,0,.5)}
.scan-stage img{width:100%;height:auto;max-height:78vh;object-fit:contain;filter:grayscale(1) contrast(1.03);animation:develop .9s var(--ease)}
.loupe{position:absolute;width:200px;height:200px;border-radius:50%;pointer-events:none;border:1px solid rgba(255,255,255,.35);box-shadow:0 0 0 1px rgba(0,0,0,.5),0 10px 40px rgba(0,0,0,.5);background-repeat:no-repeat;display:none;filter:grayscale(1) contrast(1.05);z-index:2}
.scan-stage.loupe-on .loupe{display:block}
.scan-cap{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--gray)}
.scan-close{position:absolute;top:18px;right:18px;font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);border:1px solid var(--line);padding:8px 13px;transition:.3s var(--ease)}
.scan-close:hover{color:var(--paper);border-color:var(--paper-dim)}

/* ---- projector (frame view) ---- */
.projector{position:relative;overflow:hidden}
.projector .lamp{position:absolute;inset:-25%;z-index:0;pointer-events:none;
  background:radial-gradient(58% 60% at 50% 12%, rgba(255,226,182,.22), transparent 68%);opacity:.3}
.projector .lamp.warm{animation:lamp-warm .9s var(--ease)}
.projector figure{position:relative;z-index:1}
.projector figure img.proj{animation:project-in .6s var(--ease)}
.projector .beam{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden;mix-blend-mode:screen}
.projector .mote{position:absolute;border-radius:50%;background:rgba(255,242,214,.9);filter:blur(.4px);
  opacity:.1;animation:mote-float linear infinite alternate}
.projector .gate{position:absolute;inset:0;z-index:3;background:#050506;opacity:0;pointer-events:none}
.projector .gate.flash{animation:gate-flash .24s var(--ease)}
[data-theme="day"] .projector .lamp{opacity:.18}
[data-theme="day"] .projector .mote{opacity:.16}

.tray{display:flex;gap:8px;overflow-x:auto;padding:13px;margin-top:34px;background:var(--surface-2);
  border:1px solid var(--line-soft);scrollbar-width:thin;scrollbar-color:var(--gray-dim) transparent;transition:background .6s var(--ease)}
.tray::-webkit-scrollbar{height:7px}
.tray::-webkit-scrollbar-thumb{background:var(--gray-dim)}
.tray-cell{position:relative;flex:0 0 auto;width:86px;aspect-ratio:3/2;background:var(--mat);overflow:hidden;
  outline:1px solid rgba(0,0,0,.5);opacity:.45;transition:opacity .3s var(--ease),box-shadow .3s var(--ease)}
.tray-cell img{filter:grayscale(1) contrast(1.04)}
.tray-cell:hover{opacity:.8}
.tray-cell.on{opacity:1;box-shadow:0 0 0 1px var(--paper-dim),0 0 24px var(--glow-strong)}
.tray-cell:focus-visible{outline:2px solid var(--paper);outline-offset:1px}
.tray-cell .tno{position:absolute;left:4px;bottom:3px;font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:#fff;mix-blend-mode:difference}
.projector figure{cursor:pointer}

/* ---- darkroom editor ---- */
.dk-fab{position:fixed;left:18px;bottom:18px;z-index:45;font-family:var(--mono);font-size:10px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--gray);border:1px solid var(--line);padding:9px 14px;
  background:color-mix(in srgb, var(--counter) 75%, transparent);backdrop-filter:blur(6px);transition:.3s var(--ease)}
.dk-fab:hover{color:var(--paper);border-color:var(--paper-dim)}
.dk-panel{position:fixed;inset:0;z-index:70;display:none;flex-direction:column;background:var(--counter)}
.dk-panel.open{display:flex;animation:fade .35s var(--ease)}
.dk-head{display:flex;align-items:center;gap:16px;padding:16px clamp(16px,4vw,32px);border-bottom:1px solid var(--line)}
.dk-title{font-family:var(--serif);font-size:20px;font-weight:360;color:var(--paper)}
.dk-status{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gray-dim)}
.dk-status.dirty{color:#d98b3a}
.dk-close{margin-left:auto;font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);border:1px solid var(--line);padding:8px 13px;transition:.3s var(--ease)}
.dk-close:hover{color:var(--paper);border-color:var(--paper-dim)}
.dk-body{flex:1;display:grid;grid-template-columns:230px 1fr;min-height:0}
.dk-rolls{border-right:1px solid var(--line);overflow:auto;padding:14px}
.dk-roll-item{display:flex;flex-direction:column;gap:3px;padding:11px 12px;border:1px solid transparent;cursor:pointer;transition:.2s var(--ease)}
.dk-roll-item:hover{background:var(--glow)}

<script>
let DOC = (typeof ARCHIVE!=='undefined') ? ARCHIVE : {bw:{rolls:[]},color:{rolls:[]},options:{}};
let side='bw', A=DOC.bw;
function setSide(s){ if(!DOC[s]) return; side=s; A=DOC[s]; document.documentElement.setAttribute('data-medium',s); }

function migrate(j){
  if(!j||typeof j!=='object') return DOC;
  if(j.bw && j.color) return j;
  if(Array.isArray(j.rolls)){
    return {
      bw:{photographer:j.photographer,title:j.title||'Silver Archive',subtitle:j.subtitle||'银盐档案',statement:j.statement||'',rolls:j.rolls},
      color:{photographer:j.photographer,title:'Chroma',subtitle:'彩色档案',statement:'colour · C-41 / E-6 · scanned on Epson V850',rolls:[]},
      options:j.options||{}
    };
  }
  return DOC;
}

(async function load(){
  try{
    const r = await fetch('archive.json', {cache:'no-store'});
    if(r.ok){ const j = await r.json(); DOC = migrate(j); }
  }catch(e){ /* no archive.json — use inline seed */ }
  A = DOC[side] || DOC.bw;
  boot();
})();

function boot(){
  const $ = s => document.querySelector(s);

  /* ---- synthesized darkroom sound effects (no audio files) ---- */
  const SFX = (function(){
    let ctx=null, master=null, on=false;
    function ensure(){
      if(!ctx){ try{ const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return; ctx=new AC(); master=ctx.createGain(); master.gain.value=0.16; master.connect(ctx.destination); }catch(e){ return; } }
      if(ctx && ctx.state==='suspended') ctx.resume();
    }
    function tone(freq, dur, type, gain, glideTo){
      if(!on||!ctx) return; const o=ctx.createOscillator(), g=ctx.createGain(), t=ctx.currentTime;
      o.type=type||'sine'; o.frequency.setValueAtTime(freq,t); if(glideTo) o.frequency.exponentialRampToValueAtTime(glideTo,t+dur);
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(gain,t+0.004); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.02);
    }
    function noise(dur, gain, type, freq, q){
      if(!on||!ctx) return; const n=ctx.createBufferSource(), len=Math.max(1,Math.floor(ctx.sampleRate*dur));
      const buf=ctx.createBuffer(1,len,ctx.sampleRate), d=buf.getChannelData(0);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
      n.buffer=buf; const f=ctx.createBiquadFilter(); f.type=type||'bandpass'; f.frequency.value=freq||1200; f.Q.value=q||0.8;
      const g=ctx.createGain(), t=ctx.currentTime; g.gain.setValueAtTime(gain,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      n.connect(f); f.connect(g); g.connect(master); n.start(t); n.stop(t+dur);
    }
    return {
      ensure, setOn(v){on=v;}, isOn(){return on;},
      advance(){ ensure(); noise(0.05,0.28,'bandpass',820,0.9); tone(150,0.10,'sine',0.22,70); setTimeout(()=>noise(0.03,0.16,'highpass',2400,0.6),52); },
      shutter(){ ensure(); noise(0.016,0.32,'highpass',2700,0.5); setTimeout(()=>noise(0.02,0.24,'highpass',1700,0.5),36); },
      tick(){ ensure(); noise(0.018,0.16,'bandpass',1500,1.3); tone(330,0.03,'triangle',0.05); },
      close(){ ensure(); tone(180,0.13,'sine',0.16,86); }
    };
  })();

  function placeholder(seed){
    const h = Array.from(seed).reduce((a,c)=>(a*31+c.charCodeAt(0))>>>0, 7);
    const base = 26 + (h % 36), freq = (0.4 + (h%50)/100).toFixed(2), g = base.toString(16).padStart(2,'0');
    const svg = "<svg xmlns='http://www.w3.org/2000/svg' width='300' height='200'>"+
      "<defs><filter id='f'><feTurbulence type='fractalNoise' baseFrequency='"+freq+"' numOctaves='3' seed='"+(h%99)+"'/>"+
      "<feColorMatrix type='saturate' values='0'/></filter></defs>"+
      "<rect width='300' height='200' fill='#"+g+g+g+"'/><rect width='300' height='200' filter='url(#f)' opacity='0.55'/></svg>";
    return "data:image/svg+xml;utf8,"+svg.replace(/#/g,'%23');
  }
  function media(frame, cls){
    const src = frame.img && frame.img.trim();
    if(src) return "<img class='"+(cls||'')+"' src='"+src+"' alt='frame "+frame.frame+"' loading='lazy'>";
    return "<img class='"+(cls||'')+" ph' src='"+placeholder('f-'+frame.frame+'-'+(frame.lens||''))+"' alt='frame "+frame.frame+"' loading='lazy'>";
  }

  const scanCache = {};
  function loadImg(src){ return new Promise(res=>{ if(!src||!src.trim()) return res(null); const im=new Image(); im.onload=()=>res(im); im.onerror=()=>res(null); im.src=src; }); }
  async function buildScan(roll, ri){
    if(roll.contactSheet && roll.contactSheet.trim()) return roll.contactSheet.trim();
    if(scanCache[ri]) return scanCache[ri];
    try{
      const isColor = side==='color';
      const cols=6, n=roll.frames.length, rows=Math.max(1,Math.ceil(n/cols));
      const cw=180, ch=120, gut=10, mg=22, top=82, lab=22;
      const W=mg*2+cols*cw+(cols-1)*gut, H=top+rows*(ch+lab)+mg;
      const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
      const x=cv.getContext('2d'); x.fillStyle=isColor?'#161210':'#0c0c0d'; x.fillRect(0,0,W,H);
      x.fillStyle='#e8852e'; x.font="600 18px 'IBM Plex Mono',monospace";
      x.fillText((roll.id||'').toUpperCase()+"   "+(roll.film||''), mg, 40);
      x.font="13px 'IBM Plex Mono',monospace"; x.fillStyle=isColor?'#d9a06a':'#caa56a';
      x.fillText(isColor ? ("✓ "+(roll.process||'')+"   "+(roll.lab||'')) : ("✓ "+(roll.developer||'')+"  "+(roll.dilution||'')+"   "+(roll.devTime||'')+"  "+(roll.temp||'')), mg, 62);
      const imgs = await Promise.all(roll.frames.map(f=>loadImg(f.img)));
      roll.frames.forEach((f,i)=>{
        const cx=mg+(i%cols)*(cw+gut), cy=top+Math.floor(i/cols)*(ch+lab);
        const im=imgs[i];
        if(im){
          x.save(); x.beginPath(); x.rect(cx,cy,cw,ch); x.clip(); x.filter=isColor?'contrast(1.02)':'grayscale(1) contrast(1.04)';
          const ir=im.width/im.height, tr=cw/ch; let sw,sh,sx,sy;
          if(ir>tr){ sh=im.height; sw=sh*tr; sx=(im.width-sw)/2; sy=0; } else { sw=im.width; sh=sw/tr; sx=0; sy=(im.height-sh)/2; }
          x.drawImage(im, sx,sy,sw,sh, cx,cy,cw,ch); x.restore(); x.filter='none';
        } else {
          const tone=30+((Array.from(f.frame||'?').reduce((a,c)=>a+c.charCodeAt(0),0))%40);
          x.fillStyle="rgb("+tone+","+tone+","+tone+")"; x.fillRect(cx,cy,cw,ch);
          for(let k=0;k<240;k++){const a=Math.random()*0.45;const v=Math.floor(tone-28+Math.random()*64);
            x.fillStyle="rgba("+v+","+v+","+v+","+a+")"; x.fillRect(cx+Math.random()*cw, cy+Math.random()*ch, 1.4, 1.4);}
        }

  function fileToImg(file){
    return new Promise(res=>{
      const img=new Image(), url=URL.createObjectURL(file);
      img.onload=()=>{ try{
        const maxEdge=2000, sc=Math.min(1, maxEdge/Math.max(img.width,img.height));
        const w=Math.round(img.width*sc), h=Math.round(img.height*sc);
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',0.82));
      }catch(e){ res(''); } finally{ URL.revokeObjectURL(url); } };
      img.onerror=()=>{ URL.revokeObjectURL(url); res(''); };
      img.src=url;
    });
  }

      process:["C-41","E-6"], lab:[],

      push:["+1","+2","+3","-1","-2"],
      temp:["20°C","21°C","24°C"], scan:["Epson V850 Pro"],
      aperture:["f/1.4","f/2","f/2.8","f/4","f/5.6","f/8","f/11","f/16","f/22"],

    for(const k in defaults){ if(!Array.isArray(DOC.options[k])) DOC.options[k]=defaults[k].slice(); }
    const add=(k,v)=>{ if(v==null||v==='') return; v=String(v); if(DOC.options[k] && DOC.options[k].indexOf(v)<0) DOC.options[k].push(v); };

      const n=A.rolls.length+1, pad=String(n).padStart(3,'0');
      if(side==='color') A.rolls.push({id:'c-'+pad,title:'',date:'',camera:'',film:'',box:400,ei:400,push:'',process:'C-41',lab:'',scan:'Epson V850 Pro',contactSheet:'',frames:[]});
      else A.rolls.push({id:'roll-'+pad,title:'',date:'',camera:'',film:'',box:400,ei:400,push:'',developer:'',dilution:'',devTime:'',temp:'',scan:'Epson V850 Pro',contactSheet:'',frames:[]});
      sel=A.rolls.length-1; setDirty(true); renderEditor(); liveRefresh();
    }
  });
  // delegation: edit pane (inputs + frame actions + drop)
  dkEdit.addEventListener('input', e=>{
    if(e.target.tagName==='SELECT') return;
    const roll=A.rolls[sel]; if(!roll) return;
    if(e.target.dataset.rk!=null){
      let v=e.target.value; const k=e.target.dataset.rk;
      if((k==='box'||k==='ei')) v = v===''?'':(parseInt(v,10)||0);
      roll[k]=v; setDirty(true); clearTimeout(window.__lr); window.__lr=setTimeout(liveRefresh,350);
    } else if(e.target.dataset.fk!=null){
      const fr=e.target.closest('[data-fi]'); if(!fr) return;
      roll.frames[+fr.dataset.fi][e.target.dataset.fk]=e.target.value; setDirty(true);
      clearTimeout(window.__lr); window.__lr=setTimeout(liveRefresh,350);
    }
  });
  function applyVal(el, roll, v){
    if(el.dataset.rk!=null){ const k=el.dataset.rk; if((k==='box'||k==='ei')) v=(v===''?'':(parseInt(v,10)||v)); roll[k]=v; }
    else if(el.dataset.fk!=null){ const fr=el.closest('[data-fi]'); if(fr) roll.frames[+fr.dataset.fi][el.dataset.fk]=v; }
  }
  // delegation: dropdown change + "add new option"
  dkEdit.addEventListener('change', e=>{
    const el=e.target; if(el.tagName!=='SELECT') return;
    const roll=A.rolls[sel]; if(!roll) return;
    const optKey=el.dataset.opt;
    if(el.value==='__add__'){
      const v=((window.prompt('添加新「'+(el.dataset.label||optKey)+'」选项：',''))||'').trim();
      if(v){ if(!Array.isArray(DOC.options[optKey])) DOC.options[optKey]=[]; if(DOC.options[optKey].indexOf(v)<0) DOC.options[optKey].push(v); applyVal(el,roll,v); setDirty(true); }
      renderEdit(); liveRefresh(); return;
    }
    applyVal(el,roll,el.value); setDirty(true);
    clearTimeout(window.__lr); window.__lr=setTimeout(liveRefresh,200);
  });
  dkEdit.addEventListener('click', e=>{
    const roll=A.rolls[sel]; if(!roll) return;
    if(e.target.id==='dkDelRoll'){
      if(confirm('删除整卷「'+(roll.title||roll.id)+'」？此操作不可撤销。')){
        A.rolls.splice(sel,1); sel=A.rolls.length?Math.max(0,sel-1):-1; setDirty(true); renderEditor(); liveRefresh();
      } return;
    }
    const fr=e.target.closest('[data-fi]'); if(!fr) return; const i=+fr.dataset.fi;
    if(e.target.dataset.del){ roll.frames.splice(i,1); setDirty(true); renderEdit(); liveRefresh(); }
    else if(e.target.dataset.mv){ const j=i+(+e.target.dataset.mv);
      if(j>=0&&j<roll.frames.length){ const t=roll.frames[i];roll.frames[i]=roll.frames[j];roll.frames[j]=t; setDirty(true); renderEdit(); liveRefresh(); } }
    else if(e.target.id==='dkDrop'||e.target.closest('#dkDrop')){ dkFile.click(); }
  });
  // drag & drop onto the (delegated) drop zone
  dkEdit.addEventListener('dragover', e=>{ const d=e.target.closest('#dkDrop'); if(d){ e.preventDefault(); d.classList.add('over'); } });
  dkEdit.addEventListener('dragleave', e=>{ const d=e.target.closest('#dkDrop'); if(d) d.classList.remove('over'); });
  dkEdit.addEventListener('drop', e=>{ const d=e.target.closest('#dkDrop'); if(!d) return; e.preventDefault(); d.classList.remove('over'); if(e.dataTransfer.files.length) addFiles(e.dataTransfer.files); });
  dkFile.addEventListener('change', ()=>{ if(dkFile.files.length) addFiles(dkFile.files); dkFile.value=''; });

  // editor side switch (黑白 / 彩色)
  function syncSideBtns(){ $('#dkSide').querySelectorAll('[data-es]').forEach(b=>b.classList.toggle('on', b.dataset.es===side)); }
  $('#dkSide').addEventListener('click', e=>{
    const b=e.target.closest('[data-es]'); if(!b) return;
    if(b.dataset.es===side){ return; }
    SFX.tick(); setSide(b.dataset.es); sel = A.rolls.length?0:-1;
    syncSideBtns(); renderEditor(); renderMast(); renderIndex();
  });
  // open/close panel
  function openPanel(){ syncSideBtns(); if(sel<0&&A.rolls.length) sel=0; renderEditor(); setDirty(dirty); dkPanel.classList.add('open'); dkPanel.setAttribute('aria-hidden','false'); }
  function closePanel(){ dkPanel.classList.remove('open'); dkPanel.setAttribute('aria-hidden','true'); }
  $('#dkBtn').addEventListener('click', openPanel);
  $('#dkClose').addEventListener('click', closePanel);

  // export
  $('#dkExport').addEventListener('click', ()=>{
    const blob=new Blob([JSON.stringify(DOC,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='archive.json';
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    setDirty(false);
  });

  window.addEventListener('beforeunload', e=>{ if(dirty){ e.preventDefault(); e.returnValue=''; } });

  /* ---- first paint ---- */
  setSide(side); renderMast(); renderLanding();
  (function route(){
    const h=(location.hash||'').replace('#','');
    if(h==='bw'||h==='color'){ enterSide(h); }
    else if(h==='edit'){ setView('landing'); }
    else { setView('landing'); }
  })();
}
</script>
</body>
</html>
